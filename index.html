<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Évaluation — Lecture Arabe</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf7f2;
  --surface:#fff;
  --border:#ddd0bb;
  --accent:#8b5e3c;
  --accent2:#5c8a6b;
  --text:#2c1f10;
  --muted:#9c8672;
  --r:14px;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Subtle background pattern */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 70% 20%, #f0e6d6 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, #e6f0ea 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:640px;
  width:100%;
  padding:32px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:32px;
}

/* Header */
.header{text-align:center;}
.header-eyebrow{
  font-size:10px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:12px;
}
.header-title-ar{
  font-family:'Noto Naskh Arabic',serif;
  font-size:32px;
  font-weight:700;
  color:var(--text);
  direction:rtl;
  line-height:1.3;
  margin-bottom:6px;
}
.header-title-fr{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:16px;
}
.divider{
  width:48px;
  height:1px;
  background:var(--border);
  margin:0 auto;
}

/* Cards */
.cards{
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px 28px;
  text-decoration:none;
  color:inherit;
  display:flex;
  align-items:center;
  gap:20px;
  box-shadow:0 4px 20px rgba(100,60,20,.07);
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}
.card::after{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .2s;
}
.card-1::after{background:linear-gradient(135deg,rgba(139,94,60,.04) 0%,transparent 60%);}
.card-2::after{background:linear-gradient(135deg,rgba(92,138,107,.04) 0%,transparent 60%);}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(100,60,20,.12);
}
.card-1:hover{border-color:var(--accent);}
.card-2:hover{border-color:var(--accent2);}
.card:hover::after{opacity:1;}

.card-badge{
  flex-shrink:0;
  width:44px;
  height:44px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
}
.card-1 .card-badge{background:rgba(139,94,60,.1);color:var(--accent);}
.card-2 .card-badge{background:rgba(92,138,107,.1);color:var(--accent2);}

.card-body{flex:1;}
.card-tag{
  display:inline-block;
  padding:2px 8px;
  border-radius:4px;
  font-size:9px;
  letter-spacing:.15em;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:6px;
}
.card-1 .card-tag{background:var(--accent);color:#fff;}
.card-2 .card-tag{background:var(--accent2);color:#fff;}

.card-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  margin-bottom:4px;
  letter-spacing:.05em;
}
.card-sub{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.08em;
  line-height:1.5;
}

.card-arrow{
  flex-shrink:0;
  font-size:18px;
  color:var(--border);
  transition:color .2s, transform .2s;
}
.card-1:hover .card-arrow{color:var(--accent);transform:translateX(3px);}
.card-2:hover .card-arrow{color:var(--accent2);transform:translateX(3px);}

/* Footer note */
.footer-note{
  font-size:9px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  opacity:.6;
  text-align:center;
}

/* Entrance animations */
.header{animation:fadeDown .5s ease both;}
.card-1{animation:fadeUp .5s ease .1s both;}
.card-2{animation:fadeUp .5s ease .2s both;}
.footer-note{animation:fadeUp .5s ease .35s both;}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-16px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">Outil d'évaluation standardisé</div>
    <div class="header-title-ar">تقييم القراءة العربية</div>
    <div class="header-title-fr">Évaluation de la lecture arabe</div>
    <div class="divider"></div>
  </div>

  <div class="cards">

    <a class="card card-1" href="app1-session1.html">
      <div class="card-badge">S1</div>
      <div class="card-body">
        <div class="card-tag">Séance 1</div>
        <div class="card-title">Connaissance des lettres</div>
        <div class="card-sub">Dénomination · Phonème cible · Ordre aléatoire</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-2" href="app2-session2.html">
      <div class="card-badge">S2</div>
      <div class="card-body">
        <div class="card-tag">Séance 2</div>
        <div class="card-title">Automaticité &amp; Pseudo-mots</div>
        <div class="card-sub">Lecture chronométrée · Mots inventés vocalisés</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <div class="footer-note">Sélectionner la séance à administrer</div>

</div>
</body>
</html>
